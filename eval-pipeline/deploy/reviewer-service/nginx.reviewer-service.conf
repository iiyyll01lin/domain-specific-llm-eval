server {
    listen 80;
    server_name _;

    location /healthz {
        proxy_pass http://reviewer-service:8010/healthz;
        proxy_set_header Host $host;
    }

    location /readyz {
        proxy_pass http://reviewer-service:8010/readyz;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://reviewer-service:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Reviewer-Token $http_x_reviewer_token;
        proxy_set_header X-Reviewer-Id $http_x_reviewer_id;
        proxy_set_header X-Tenant-Id $http_x_tenant_id;
        proxy_set_header X-Reviewer-Roles $http_x_reviewer_roles;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}