data_sources:
  documents:
    document_files:
    - ../sample_documents/ai_machine_learning.txt
    - ../sample_documents/cloud_computing.txt
    - ../sample_documents/cybersecurity.txt
testset_generation:
  max_documents_for_generation: 10
  max_total_samples: 6
  prompt_config:
    templates_file: prompts/instruction_templates.yaml
    profile: default
  ragas_config:
    custom_llm:
      endpoint: http://llm-proxy.tao.inventec.net/v1
      model: google/gemma-2-9b-it
      api_key: ${CUSTOM_LLM_API_KEY}
      temperature: 0.3
      timeout: 60
    embeddings_model: ./cache/all-MiniLM-L6-v2
  generation:
    async_generation:
      enabled: true
      max_workers: 8
      batch_size: 4
      timeout: 180
      max_retries: 6
      max_wait: 60
      log_tenacity: false
    query_distribution:
    - synthesizer: single_hop_specific
      weight: 0.4
    - synthesizer: multi_hop_abstract
      weight: 0.4
    - synthesizer: multi_hop_specific
      weight: 0.2
rag_system:
  endpoint: http://localhost:8000/v1/chat/completions
output:
  base_dir: ./outputs
  use_timestamps: true
logging:
  level: INFO
