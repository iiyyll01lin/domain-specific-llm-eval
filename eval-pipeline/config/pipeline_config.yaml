data_sources:
  documents:
    document_files:
      - ../sample_documents/ai_machine_learning.txt
      - ../sample_documents/cloud_computing.txt
      - ../sample_documents/cybersecurity.txt

testset_generation:
  max_documents_for_generation: 10
  max_total_samples: 6

output:
  base_dir: ./outputs
  use_timestamps: true

logging:
  level: INFO

rag_system:
  endpoint: "http://localhost:8000/v1/chat/completions"
testset_generation:
  max_documents_for_generation: 10
  max_total_samples: 6
  ragas_config:
    custom_llm:
      endpoint: "http://localhost:8000/v1/chat/completions"
      model: "google/gemma-2-9b-it"
