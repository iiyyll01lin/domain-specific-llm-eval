name: Eval Pipeline CI Benchmarks
on:
  pull_request:
    paths:
      - "eval-pipeline/**"
jobs:
  ragas_eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r eval-pipeline/requirements.minimal.txt

      - name: Run maintained benchmark checks
        run: |
          python -m pytest -q \
            eval-pipeline/tests/test_ragas_evaluator_domain_metrics.py \
            eval-pipeline/tests/test_contextual_keyword_evaluator.py \
            eval-pipeline/tests/test_report_generator_regression.py

      - name: Build benchmark summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          summary = {
              "run_id": "ci-benchmark",
              "checks": [
                  {"name": "domain-metrics", "ok": True, "details": "RAGAS domain metric regressions passed"},
                  {"name": "contextual-keyword", "ok": True, "details": "Synonym/partial/contextual relevance tests passed"},
                  {"name": "report-regression", "ok": True, "details": "Report generator regression tests passed"},
              ],
              "artifacts": [
                  "eval-pipeline/tests/test_ragas_evaluator_domain_metrics.py",
                  "eval-pipeline/tests/test_contextual_keyword_evaluator.py",
                  "eval-pipeline/tests/test_report_generator_regression.py",
              ],
          }
          out = Path("benchmark-summary.json")
          out.write_text(json.dumps(summary, indent=2), encoding="utf-8")
          PY

      - name: Render PR benchmark comment
        run: |
          PYTHONPATH=eval-pipeline/src python - <<'PY'
          from pathlib import Path
          from utils.benchmark_comment import write_benchmark_comment

          write_benchmark_comment(Path("benchmark-summary.json"), Path("benchmark-comment.md"))
          PY

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eval-pipeline-benchmark-summary
          path: |
            benchmark-summary.json
            benchmark-comment.md
          retention-days: 30

      - name: Upsert benchmark comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('benchmark-comment.md', 'utf8');
            const marker = '## Eval Pipeline Benchmark Summary';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.data.find(comment => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
