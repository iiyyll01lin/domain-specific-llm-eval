name: Evaluation Pipeline CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pipenv
        pip install -r requirements.txt || echo "No requirements.txt"
        pip install pytest anyio langsmith
    - name: Run Pytest
      run: |
        PYTHONPATH=./eval-pipeline pytest eval-pipeline/tests/
