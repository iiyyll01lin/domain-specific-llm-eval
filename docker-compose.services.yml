version: '3.9'
services:
  ingestion:
    build: .
    environment:
      SERVICE: ingestion
      SERVICE_NAME: ingestion-service
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
  processing:
    build: .
    environment:
      SERVICE: processing
      SERVICE_NAME: processing-service
    ports:
      - "8002:8000"
    healthcheck:
