[mypy]
python_version = 3.10
mypy_path = eval-pipeline/src
namespace_packages = True
explicit_package_bases = True
follow_imports = silent
disallow_untyped_defs = True
check_untyped_defs = True
no_implicit_optional = True
warn_return_any = True
warn_unused_ignores = True
pretty = True

[mypy-global_tiktoken_patch]
ignore_missing_imports = True

[mypy-offline_model_manager]
ignore_missing_imports = True

[mypy-nan_handling]
ignore_missing_imports = True

[mypy-src]
ignore_missing_imports = True

[mypy-src.*]
ignore_missing_imports = True

[mypy-pandas]
ignore_missing_imports = True

[mypy-datasets]
ignore_missing_imports = True

[mypy-ragas]
ignore_missing_imports = True

[mypy-ragas.*]
ignore_missing_imports = True

[mypy-boto3]
ignore_missing_imports = True

[mypy-boto3.*]
ignore_missing_imports = True

[mypy-botocore]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True

[mypy-langchain]
ignore_missing_imports = True

[mypy-langchain.*]
ignore_missing_imports = True

[mypy-langchain_community]
ignore_missing_imports = True

[mypy-langchain_community.*]
ignore_missing_imports = True

[mypy-openpyxl]
ignore_missing_imports = True

[mypy-openpyxl.*]
ignore_missing_imports = True

[mypy-yaml]
ignore_missing_imports = True

[mypy-requests]
ignore_missing_imports = True